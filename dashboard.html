<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/delta-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900&display=swap" rel="stylesheet" />
    <title>Revenue Analytics — Delta Diamonds</title>
    <style>
      /* Base resets not covered by Tailwind preflight */
      *, *::before, *::after { box-sizing: border-box; }

      /* Smooth scrolling */
      html { scroll-behavior: smooth; }

      /* Thin scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.35); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.55); }

      /* Shimmer for loading skeleton */
      .skeleton {
        background: linear-gradient(90deg, transparent 25%, rgba(148,163,184,0.12) 50%, transparent 75%);
        background-size: 200% 100%;
        animation: shimmerAnim 1.6s infinite;
      }
      @keyframes shimmerAnim {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* Recharts tooltip override */
      .recharts-tooltip-wrapper { outline: none !important; }
      .recharts-tooltip-cursor { fill: rgba(148,163,184,0.06) !important; }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-50 font-sans antialiased">
    <div id="dash-root"></div>
    <script type="module" src="/src/dashboard-main.tsx"></script>
  </body>
</html>
