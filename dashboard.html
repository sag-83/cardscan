<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/delta-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Revenue Analytics — Delta Diamonds</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #eef2f7;
      }

      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* ── Keyframes ─────────────────────────────────── */
      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse-ring {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.6; }
      }

      /* ── Utilities ─────────────────────────────────── */
      .fade-up  { animation: fadeUp 0.38s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .fade-up-1{ animation-delay: 0.04s; }
      .fade-up-2{ animation-delay: 0.08s; }
      .fade-up-3{ animation-delay: 0.12s; }
      .fade-up-4{ animation-delay: 0.16s; }
      .fade-up-5{ animation-delay: 0.20s; }

      .shimmer {
        background: linear-gradient(90deg, #f1f5f9 25%, #e8edf4 50%, #f1f5f9 75%);
        background-size: 200% 100%;
        animation: shimmer 1.6s infinite;
        border-radius: 8px;
      }
      .spin { animation: spin 0.75s linear infinite; }

      /* ── Sidebar nav ───────────────────────────────── */
      .nav-btn {
        transition: background 0.13s, color 0.13s;
        border-radius: 9px;
      }
      .nav-btn:hover:not(.nav-active) {
        background: rgba(255,255,255,0.07) !important;
        color: rgba(255,255,255,0.88) !important;
      }
      .nav-active {
        background: rgba(99,102,241,0.18) !important;
        color: #a5b4fc !important;
        font-weight: 600 !important;
      }
      .nav-active svg { stroke: #a5b4fc; }

      /* ── Cards ─────────────────────────────────────── */
      .card-lift { transition: box-shadow 0.18s, transform 0.18s; }
      .card-lift:hover {
        box-shadow: 0 12px 36px rgba(0,0,0,0.11), 0 3px 10px rgba(0,0,0,0.06) !important;
        transform: translateY(-2px);
      }

      /* ── Buttons ───────────────────────────────────── */
      .btn { transition: all 0.13s; cursor: pointer; font-family: inherit; }
      .btn:active { transform: scale(0.97); }
      .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
      .btn-ghost:hover   { background: #f1f5f9 !important; }
      .btn-danger        { transition: all 0.13s; }
      .btn-danger:hover  { background: #fee2e2 !important; color: #dc2626 !important; border-color: #fca5a5 !important; }
      .btn-paid:hover    { background: #d1fae5 !important; color: #059669 !important; border-color: #6ee7b7 !important; }

      /* ── Period tabs ───────────────────────────────── */
      .period-tab { transition: all 0.13s; }
      .period-tab:hover:not(.period-active) {
        background: rgba(255,255,255,0.14) !important;
        color: rgba(255,255,255,0.92) !important;
      }
      .period-active {
        background: rgba(255,255,255,0.96) !important;
        color: #0f172a !important;
        font-weight: 700 !important;
        box-shadow: 0 1px 5px rgba(0,0,0,0.14);
      }

      /* ── Table rows ────────────────────────────────── */
      .tr-hover { transition: background 0.1s; cursor: default; }
      .tr-hover:hover { background: #f8fafc !important; }

      /* ── Inputs ────────────────────────────────────── */
      input, select { font-family: inherit; }
      input[type="search"]:focus,
      input[type="password"]:focus,
      input[type="text"]:focus,
      select:focus {
        outline: 2px solid rgba(99,102,241,0.45) !important;
        outline-offset: -2px !important;
      }
      ::placeholder { color: #94a3b8; }
    </style>
  </head>
  <body>
    <div id="dash-root"></div>
    <script type="module" src="/src/dashboard-main.tsx"></script>
  </body>
</html>
