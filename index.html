<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;


// ═══════════════════════════════════════════════════════════
// CARDSCAN AI v3 — React + Supabase
// ═══════════════════════════════════════════════════════════

const SB_URL = "https://wtuytlgwyxfvybxwxfhz.supabase.co";
const SB_KEY = "sb_publishable_cPzZiLbs1hF16ZX0J6ylVg_8_Fc0BOo";
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyfAnj2mpcfyPvuQbaw37-pjAmGuacPccixFAyolmbQUXQFms3N4v9IarC7QjiFNF-Fwg/exec";

const sbHeaders = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, "Content-Type": "application/json" };

const GEMINI_PROMPT = `You are a business card data extractor. For EACH card in the image extract these fields:
- name (full name)
- title (job title)
- company (business/company name)
- email
- phone_mobile (mobile/cell number - if only one phone found, put it here)
- phone_work (office/work number)
- phone_fax (fax number)
- website (website or primary social URL)
- address (street address)
- city
- state
- zip (zip/postal code)
- country
- notes (any other info: social media handles, LinkedIn URLs, etc)

Return ONLY valid JSON array. Example:
[{"name":"JOHN DOE","title":"CEO","company":"ACME INC","email":"john@acme.com","phone_mobile":"+12125551234","phone_work":"+12125555678","phone_fax":"","website":"acme.com","address":"123 MAIN ST","city":"NEW YORK","state":"NY","zip":"10001","country":"USA","notes":"LinkedIn: linkedin.com/in/johndoe"}]
IMPORTANT: Return ALL text values in UPPERCASE. Empty string for missing fields.`;

// ─── Supabase helpers ───
const sb = {
  async getAll() {
    const r = await fetch(`${SB_URL}/rest/v1/contacts?order=created_at.desc`, { headers: { ...sbHeaders, Prefer: "return=representation" } });
    return r.ok ? r.json() : [];
  },
  async upsert(contacts) {
    const r = await fetch(`${SB_URL}/rest/v1/contacts`, {
      method: "POST", headers: { ...sbHeaders, Prefer: "return=representation,resolution=merge-duplicates" },
      body: JSON.stringify(contacts)
    });
    return r.ok;
  },
  async update(id, data) {
    const r = await fetch(`${SB_URL}/rest/v1/contacts?id=eq.${id}`, {
      method: "PATCH", headers: { ...sbHeaders, Prefer: "return=representation" },
      body: JSON.stringify(data)
    });
    return r.ok;
  },
  async remove(id) {
    return (await fetch(`${SB_URL}/rest/v1/contacts?id=eq.${id}`, { method: "DELETE", headers: sbHeaders })).ok;
  },
  async uploadPhoto(file, contactId, side) {
    const ext = file.name?.split(".").pop() || "jpg";
    const path = `${contactId}_${side}.${ext}`;
    const r = await fetch(`${SB_URL}/storage/v1/object/card-photos/${path}`, {
      method: "POST", headers: { ...sbHeaders, "Content-Type": file.type, "x-upsert": "true" },
      body: file
    });
    return r.ok ? `${SB_URL}/storage/v1/object/public/card-photos/${path}` : null;
  }
};

// ─── Utils ───
const uid = () => Math.random().toString(36).slice(2, 10);
const today = () => new Date().toISOString().split("T")[0];
const up = (s) => (s || "").toString().toUpperCase().trim();
const makeUrl = (u) => u && !u.match(/^https?:\/\//) ? "https://" + u : u;

function extractSocials(text) {
  if (!text) return [];
  const s = [], t = text.toLowerCase();
  if (t.includes("linkedin")) { const m = text.match(/(https?:\/\/)?(www\.)?linkedin\.com\/\S+/i); s.push({ icon: "💼", label: "LinkedIn", url: m ? makeUrl(m[0]) : "https://linkedin.com" }); }
  if (t.includes("twitter") || t.includes("x.com")) { const m = text.match(/(https?:\/\/)?(www\.)?(twitter|x)\.com\/\S+/i); s.push({ icon: "𝕏", label: "X", url: m ? makeUrl(m[0]) : "https://x.com" }); }
  if (t.includes("instagram")) { const m = text.match(/(https?:\/\/)?(www\.)?instagram\.com\/\S+/i); s.push({ icon: "📸", label: "Instagram", url: m ? makeUrl(m[0]) : "https://instagram.com" }); }
  if (t.includes("facebook")) { const m = text.match(/(https?:\/\/)?(www\.)?facebook\.com\/\S+/i); s.push({ icon: "📘", label: "Facebook", url: m ? makeUrl(m[0]) : "https://facebook.com" }); }
  return s;
}

function makeVCard(c) {
  return `BEGIN:VCARD\nVERSION:3.0\nFN:${c.name}\nN:${(c.name || "").split(" ").reverse().join(";")}\nORG:${c.company}\nTITLE:${c.title}\n${c.phone_mobile ? "TEL;TYPE=CELL:" + c.phone_mobile + "\n" : ""}${c.phone_work ? "TEL;TYPE=WORK:" + c.phone_work + "\n" : ""}${c.phone_fax ? "TEL;TYPE=FAX:" + c.phone_fax + "\n" : ""}${c.email ? "EMAIL:" + c.email + "\n" : ""}ADR;TYPE=WORK:;;${c.address};${c.city};${c.state};${c.zip};${c.country}\n${c.website ? "URL:" + c.website + "\n" : ""}${c.user_notes ? "NOTE:" + c.user_notes + "\n" : ""}END:VCARD`;
}

// ─── Icons ───
const I = {
  scan: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>,
  contacts: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>,
  bulk: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>,
  settings: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
  filter: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>,
  search: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>,
  check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>,
  x: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>,
  edit: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  back: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5m7-7l-7 7 7 7"/></svg>,
};

// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════
function CardScanAI() {
  const [tab, setTab] = useState("scan");
  const [contacts, setContacts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [scanning, setScanning] = useState(false);
  const [preview, setPreview] = useState(null);
  const [viewContact, setViewContact] = useState(null);
  const [editMode, setEditMode] = useState(false);
  const [editData, setEditData] = useState({});
  const [filterModal, setFilterModal] = useState(false);
  const [bulkModal, setBulkModal] = useState(null);
  const [filters, setFilters] = useState({ star: 0, state: "", city: "", q: "" });
  const [selected, setSelected] = useState(new Set());
  const [toast, setToast] = useState("");
  const [theme, setTheme] = useState(() => localStorage.getItem("cs_theme") || "dark");
  const [geminiKey, setGeminiKey] = useState(() => localStorage.getItem("cs_gemini") || "");
  const fileRef = useRef();
  const backFileRef = useRef();

  const isDark = theme === "dark";

  // ─── Theme CSS vars ───
  const T = isDark ? {
    bg: "#06060a", bg2: "#0f0f16", bg3: "#181822", bg4: "#22222e",
    border: "#2a2a3a", text: "#eeeef5", text2: "#9999aa", text3: "#5a5a70",
    accent: "#34d399", accent2: "#60a5fa", shadow: "0 4px 20px rgba(0,0,0,.4)",
    modalBg: "rgba(0,0,0,.75)", cardBg: "linear-gradient(135deg, #0f0f18, #141420)"
  } : {
    bg: "#f2f2f5", bg2: "#ffffff", bg3: "#eaeaef", bg4: "#dddde5",
    border: "#d0d0da", text: "#1a1a2e", text2: "#5a5a70", text3: "#8888a0",
    accent: "#059669", accent2: "#2563eb", shadow: "0 4px 20px rgba(0,0,0,.06)",
    modalBg: "rgba(0,0,0,.3)", cardBg: "linear-gradient(135deg, #ffffff, #f8f8fc)"
  };

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(""), 3000); };

  // ─── Load from Supabase ───
  useEffect(() => { sb.getAll().then(c => { setContacts(c); setLoading(false); }).catch(() => setLoading(false)); }, []);

  // ─── Save theme ───
  useEffect(() => { localStorage.setItem("cs_theme", theme); }, [theme]);
  useEffect(() => { localStorage.setItem("cs_gemini", geminiKey); }, [geminiKey]);

  // ─── Gemini call ───
  const callGemini = async (base64, mime) => {
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contents: [{ parts: [{ text: GEMINI_PROMPT }, { inline_data: { mime_type: mime, data: base64 } }] }], generationConfig: { temperature: 0.1, maxOutputTokens: 8192 } })
    });
    if (!r.ok) throw new Error("API error " + r.status);
    const d = await r.json(), t = d.candidates?.[0]?.content?.parts?.[0]?.text || "";
    const m = t.match(/\[[\s\S]*\]/);
    if (!m) throw new Error("No data found");
    return JSON.parse(m[0]);
  };

  // ─── Scan handler ───
  const handleScan = async (e, existingId) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (!geminiKey) { showToast("Set Gemini API key in Settings"); setTab("settings"); return; }
    setScanning(true);
    try {
      const base64 = await new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result.split(",")[1]); fr.readAsDataURL(file); });
      const results = await callGemini(base64, file.type);

      if (existingId) {
        // Back scan
        const photoUrl = await sb.uploadPhoto(file, existingId, "back");
        const backText = results.map(r => Object.entries(r).filter(([,v])=>v).map(([k,v])=>`${k}: ${v}`).join(", ")).join(" | ");
        await sb.update(existingId, { back_notes: up(backText), back_photo: photoUrl });
        const updated = await sb.getAll();
        setContacts(updated);
        showToast("Back side merged!");
      } else {
        const enriched = await Promise.all(results.map(async (c) => {
          const id = uid();
          const photoUrl = await sb.uploadPhoto(file, id, "front");
          return {
            id, stars: 0, user_notes: "", scanned_at: today(), back_notes: "", sent_to_sheets: false,
            front_photo: photoUrl, back_photo: null,
            name: up(c.name), title: up(c.title), company: up(c.company), email: (c.email || "").toLowerCase(),
            phone_mobile: c.phone_mobile || "", phone_work: c.phone_work || "", phone_fax: c.phone_fax || "",
            website: c.website || "", address: up(c.address), city: up(c.city), state: up(c.state),
            zip: c.zip || "", country: up(c.country), notes: up(c.notes)
          };
        }));
        setPreview(enriched);
      }
    } catch (err) { showToast("Scan failed: " + err.message); }
    setScanning(false);
    e.target.value = "";
  };

  const acceptPreview = async () => {
    await sb.upsert(preview);
    const all = await sb.getAll();
    setContacts(all);
    showToast(`${preview.length} card(s) saved!`);
    setPreview(null);
    setTab("contacts");
  };

  // ─── Filtering ───
  const uniqueStates = [...new Set(contacts.map(c => c.state).filter(Boolean))].sort();
  const uniqueCities = [...new Set(contacts.map(c => c.city).filter(Boolean))].sort();
  const filtered = contacts.filter(c => {
    if (filters.star > 0 && c.stars !== filters.star) return false;
    if (filters.state && c.state !== filters.state) return false;
    if (filters.city && c.city !== filters.city) return false;
    if (filters.q && !(c.name + c.company + c.email + c.phone_mobile).toLowerCase().includes(filters.q.toLowerCase())) return false;
    return true;
  });

  // ─── Selection ───
  const toggleSel = (id) => setSelected(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const selAll = () => setSelected(selected.size === filtered.length ? new Set() : new Set(filtered.map(c => c.id)));

  // ─── Export ───
  const exportCSV = () => {
    const list = selected.size ? contacts.filter(c => selected.has(c.id)) : contacts;
    if (!list.length) return showToast("No contacts");
    const h = ["Name","Title","Company","Email","Mobile","Work","Fax","Website","Address","City","State","Zip","Country","Stars","Notes","Your Notes"];
    const rows = list.map(c => [c.name,c.title,c.company,c.email,c.phone_mobile,c.phone_work,c.phone_fax,c.website,c.address,c.city,c.state,c.zip,c.country,c.stars,c.notes,c.user_notes].map(v => `"${(v||"").toString().replace(/"/g,'""')}"`).join(","));
    const blob = new Blob([h.join(",") + "\n" + rows.join("\n")], { type: "text/csv" });
    Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: `cards_${today()}.csv` }).click();
    showToast("CSV downloaded!");
  };

  const exportSheets = async () => {
    const list = selected.size ? contacts.filter(c => selected.has(c.id)) : contacts;
    const nw = list.filter(c => !c.sent_to_sheets);
    if (!nw.length) return showToast("All already in Sheets!");
    showToast(`Sending ${nw.length}...`);
    try {
      await fetch(SHEETS_URL, { method: "POST", body: JSON.stringify(nw), mode: "no-cors" });
      for (const c of nw) await sb.update(c.id, { sent_to_sheets: true });
      setContacts(await sb.getAll());
      showToast(`${nw.length} sent to Sheets!`);
    } catch (e) { showToast("Failed"); }
  };

  const saveContact = async () => {
    const d = { ...editData };
    ["name","title","company","address","city","state","country","notes"].forEach(k => d[k] = up(d[k]));
    d.email = (d.email || "").toLowerCase();
    await sb.update(d.id, d);
    setContacts(await sb.getAll());
    setEditMode(false);
    setViewContact(d);
    showToast("Saved!");
  };

  const deleteContact = async (id) => {
    await sb.remove(id);
    setContacts(await sb.getAll());
    setViewContact(null); setEditMode(false);
    showToast("Deleted");
  };

  const saveToPhone = (c) => {
    const blob = new Blob([makeVCard(c)], { type: "text/vcard" });
    Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: `${(c.name || "contact").replace(/\s+/g, "_")}.vcf` }).click();
    showToast("Open .vcf to save contact!");
  };

  // ─── Styles ───
  const css = {
    app: { fontFamily: "'Outfit', system-ui, sans-serif", background: T.bg, color: T.text, minHeight: "100vh", maxWidth: 480, margin: "0 auto", paddingBottom: 80, position: "relative" },
    header: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px", background: T.bg2, borderBottom: `1px solid ${T.border}`, position: "sticky", top: 0, zIndex: 50, backdropFilter: "blur(20px)" },
    logo: { fontSize: 22, fontWeight: 800, background: "linear-gradient(135deg,#34d399,#60a5fa)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", letterSpacing: -0.5 },
    nav: { position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, display: "flex", background: T.bg2, borderTop: `1px solid ${T.border}`, zIndex: 50, padding: "4px 0" },
    navBtn: (active) => ({ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "8px 0", border: "none", background: "none", color: active ? T.accent : T.text3, fontSize: 10, fontWeight: 700, cursor: "pointer" }),
    navIcon: { width: 20, height: 20 },
    card: { background: T.cardBg, borderRadius: 16, padding: "14px 16px", marginBottom: 8, border: `1px solid ${T.border}`, boxShadow: T.shadow, cursor: "pointer", transition: "transform .15s" },
    btn: (variant) => ({
      display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8,
      padding: variant === "sm" ? "8px 14px" : "12px 20px", borderRadius: 12, border: "none",
      fontWeight: 700, fontSize: variant === "sm" ? 13 : 14, cursor: "pointer", transition: "all .15s",
      ...(variant === "primary" ? { background: "linear-gradient(135deg,#34d399,#60a5fa)", color: "#000" } :
        variant === "danger" ? { background: "#ef4444", color: "#fff" } :
        { background: T.bg3, color: T.text, border: `1px solid ${T.border}` })
    }),
    input: { width: "100%", padding: "12px 14px", background: T.bg3, border: `1.5px solid ${T.border}`, borderRadius: 10, color: T.text, fontSize: 14, outline: "none", fontFamily: "inherit", boxSizing: "border-box" },
    label: { fontSize: 11, fontWeight: 700, color: T.text3, marginBottom: 4, display: "block", textTransform: "uppercase", letterSpacing: 0.5 },
    modal: { position: "fixed", inset: 0, background: T.modalBg, zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center" },
    modalContent: { background: T.bg2, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, maxHeight: "90vh", overflow: "auto", padding: "20px 20px 40px" },
    handle: { width: 36, height: 4, borderRadius: 4, background: T.bg4, margin: "0 auto 14px" },
    section: { fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.8, color: T.text3, margin: "18px 0 8px" },
    pill: { display: "flex", alignItems: "center", gap: 6, padding: "10px 14px", borderRadius: 10, background: T.bg3, border: `1px solid ${T.border}`, color: T.text, textDecoration: "none", fontSize: 13, fontWeight: 600, flex: 1, justifyContent: "center", minWidth: 0 },
    chip: (on) => ({ padding: "6px 14px", borderRadius: 99, border: `1.5px solid ${on ? T.accent : T.border}`, background: on ? (isDark ? "rgba(52,211,153,.1)" : "rgba(5,150,105,.08)") : T.bg3, color: on ? T.accent : T.text3, fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", display: "inline-block" }),
    badge: { background: T.accent, color: "#000", borderRadius: 99, padding: "2px 9px", fontSize: 11, fontWeight: 800 },
    toast: { position: "fixed", top: 72, left: "50%", transform: "translateX(-50%)", background: T.accent, color: "#000", padding: "10px 24px", borderRadius: 12, fontWeight: 700, fontSize: 14, zIndex: 200, boxShadow: "0 8px 24px rgba(52,211,153,.3)", pointerEvents: "none" },
    viewField: { marginBottom: 12 },
    viewLabel: { fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.6, color: T.text3, marginBottom: 2 },
    viewValue: { fontSize: 15, fontWeight: 600, color: T.text, wordBreak: "break-word" },
  };

  // ═══════════════════════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════════════════════
  return (
    <div style={css.app}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}input:focus,textarea:focus,select:focus{border-color:${T.accent}!important;outline:none}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:${T.bg4};border-radius:4px}@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}}@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}50%{box-shadow:0 0 40px rgba(52,211,153,.08)}}`}</style>

      {/* HEADER */}
      <div style={css.header}>
        {viewContact ? (

                  </div>

              </div>

        </div>

          {selected.size > 0 && <button style={{ ...css.btn("danger"), width: "100%", marginTop: 16, padding: 14 }} onClick={async () => { for (const id of selected) await sb.remove(id); setContacts(await sb.getAll()); setSelected(new Set()); showToast("Deleted!"); }}>🗑 Delete Selected ({selected.size})</button>}

            {bulkModal === "email" && <>
              <div style={{ marginBottom: 12 }}><label style={css.label}>Your Email</label><input id="bFrom" style={css.input} placeholder="you@email.com" defaultValue={localStorage.getItem("cs_fe") || ""} /></div>
              <div style={{ marginBottom: 12 }}><label style={css.label}>Subject</label><input id="bSubj" style={css.input} placeholder="Great meeting you..." /></div>
            </>}
            <div style={{ marginBottom: 16 }}><label style={css.label}>Message</label><textarea id="bBody" style={{ ...css.input, height: 120, resize: "none" }} placeholder="Hi! It was great connecting..." /></div>
            <button style={{ ...css.btn("primary"), width: "100%" }} onClick={() => {
              const list = selected.size ? contacts.filter(c => selected.has(c.id)) : contacts;
              const body = document.getElementById("bBody")?.value || "";
              if (bulkModal === "email") {
                const em = list.map(c => c.email).filter(Boolean).join(",");
                const from = document.getElementById("bFrom")?.value || "";
                if (from) localStorage.setItem("cs_fe", from);
                window.location.href = `mailto:${from}?bcc=${encodeURIComponent(em)}&subject=${encodeURIComponent(document.getElementById("bSubj")?.value || "")}&body=${encodeURIComponent(body)}`;
              } else {
                const ph = list.map(c => c.phone_mobile).filter(Boolean).join(",");
                window.open(`sms:${ph}?body=${encodeURIComponent(body)}`);
              }
              setBulkModal(null);
            }}>✈ Send</button>
          </div>
        </div>
      )}

      {/* ═══ BOTTOM NAV ═══ */}
      {!viewContact && (
        <div style={css.nav}>
          {[["scan", I.scan, "Scan"], ["contacts", I.contacts, "Contacts"], ["bulk", I.bulk, "Bulk"], ["settings", I.settings, "Settings"]].map(([key, icon, label]) => (
            <button key={key} style={css.navBtn(tab === key)} onClick={() => setTab(key)}>
              <div style={css.navIcon}>{icon}</div>{label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CardScanAI />);
</script>
</body>
</html>
