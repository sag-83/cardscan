<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CardHolder" />
    <meta name="theme-color" content="#1a1a1a" id="metaTheme" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap"
      rel="stylesheet"
    />
    <title>CardHolder</title>
  </head>
  <body>
    <p id="boot-hint" style="margin:0;padding:24px;text-align:center;font-family:system-ui,sans-serif;font-size:14px;color:#8e8e93;">
      Loading CardHolder…
    </p>
    <div id="root"></div>
    <script>
      window.setTimeout(function () {
        var root = document.getElementById('root')
        var hint = document.getElementById('boot-hint')
        if (!hint || !root || root.childElementCount > 0) {
          if (hint) hint.remove()
          return
        }
        hint.innerHTML =
          'CardHolder could not load (often a cached update). ' +
          '<a href="/?v=' + Date.now() + '" style="color:#007aff">Tap here to refresh</a>'
      }, 10000)
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
